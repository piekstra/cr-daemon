name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift run cr-daemon-tests

      - name: Package .app
        run: ./Scripts/make-app.sh

      - name: Verify bundle
        run: |
          test -f build/cr-daemon.app/Contents/MacOS/cr-daemon
          test -f build/cr-daemon.app/Contents/Info.plist
          codesign -dv build/cr-daemon.app 2>&1 | grep -q "Identifier=com.piekstra.cr-daemon"
